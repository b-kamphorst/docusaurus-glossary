name: Lint and test

on:
  push:
    branches: [main]
    tags: ["v*"]

  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x, 24.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run typecheck
        run: npm run typecheck

      - name: Run lint
        run: npm run lint

  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  check_tag:
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag'
    outputs:
      is_semver_tag: ${{ steps.semver.outputs.is_semver_tag }}
      version: ${{ steps.semver.outputs.version }}

    steps:
      - name: Check if tag is semver
        id: semver
        run: |
          if [[ "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            VERSION=${GITHUB_REF_NAME#v}
            echo "is_semver_tag=true" >> "$GITHUB_OUTPUT"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "Detected version: $VERSION"
          else
            echo "is_semver_tag=false" >> "$GITHUB_OUTPUT"
            echo "No semantic version detected in tag: $GITHUB_REF_NAME"
          fi

  publish:
    runs-on: ubuntu-latest
    needs: [lint, test, check_tag]
    if: needs.check_tag.outputs.is_semver_tag == 'true'

    permissions:
      contents: read
      id-token: write

    env:
      # Enable provenance (if supported by your npm org; otherwise it’s harmless)
      NPM_CONFIG_PROVENANCE: true
      WORKSPACE_PATH: package/docusaurus-glossary

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # ensures tags are present

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.x"
          registry-url: "https://registry.npmjs.org"

      - name: Print version
        id: tag
        run: |
          echo "Publishing for version: ${{ needs.check_tag.outputs.version }}"

      - name: Install dependencies (root)
        run: npm ci

      - name: Ensure package.json version matches tag
        id: pkg
        run: |
          PKG_VERSION=$(node -p "require('./${WORKSPACE_PATH}/package.json').version")
          echo "package_version=${PKG_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Tag version: ${{ needs.check_tag.outputs.version }}"
          echo "Package version: $PKG_VERSION"
          if [ "${PKG_VERSION}" != "${{ needs.check_tag.outputs.version }}" ]; then
            echo "Version mismatch: tag is v${{ needs.check_tag.outputs.version }} but package.json is ${PKG_VERSION}"
            exit 1
          fi

      - name: Ensure README-gif URL matches tag
        id: readme
        run: |
          if ! grep -q "$GITHUB_REF" ${WORKSPACE_PATH}/README.md; then
            echo "GIF url in README is not pinned to ${GITHUB_REF}"
            exit 1
          fi

      - name: Publish to npm
        run: |
          npm publish -w "${WORKSPACE_PATH}"
